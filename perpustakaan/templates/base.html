<!doctype html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}SIPUSTAKA - Sistem Peminjaman Buku{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Icons+Outlined" rel="stylesheet" />

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: "#eff6ff",
                            100: "#dbeafe",
                            200: "#bfdbfe",
                            300: "#93c5fd",
                            400: "#60a5fa",
                            500: "#3b82f6",
                            600: "#2563eb",
                            700: "#1d4ed8",
                            800: "#1e40af",
                            900: "#1e3a8a",
                        },
                    },
                },
            },
        };
    </script>

    <style>
        body {
            font-family: Inter, sans-serif;
        }
    </style>
</head>

<body class="bg-[#f8fafc] text-slate-900">

    <div class="min-h-screen flex flex-col md:flex-row">

        <!-- Sidebar -->
        <aside class="w-full md:w-52 bg-[#090d16] text-slate-100 flex flex-col">

            <!-- Logo + Dynamic Title -->
            <div class="px-4 py-5 border-b border-slate-900">
                <div class="flex items-center gap-3">
                    <div
                        class="w-9 h-9 rounded-2xl bg-gradient-to-br from-brand-500 to-sky-400 flex items-center justify-center shadow-lg shadow-brand-500/30">
                        <span class="text-base font-bold text-white">P</span>
                    </div>
                    <div>
                        <p class="text-[9px] font-bold text-slate-500 uppercase tracking-[1px]">SIPUSTAKA</p>
                        <h1 class="text-sm font-bold text-white leading-tight mt-0.5">
                            {% block sidebar_title %}Sistem Buku{% endblock %}
                        </h1>
                    </div>
                </div>
            </div>

            <!-- Navigation -->
            <nav class="px-2.5 py-4 space-y-1 flex-1">

                <a href="{% url 'index' %}"
                    class="flex items-center gap-3 px-3.5 py-2.5 rounded-xl text-sm font-medium transition
                          {% if request.path == '/' %}bg-[#131926] text-white{% else %}text-slate-400 hover:bg-[#131926]/60 hover:text-white{% endif %}">
                    <span class="material-icons-outlined text-[19px]">grid_view</span>
                    <span>Dashboard</span>
                </a>

                <a href="{% url 'buku_list' %}"
                    class="flex items-center gap-3 px-3.5 py-2.5 rounded-xl text-sm font-medium transition
                          {% if '/buku/' in request.path %}bg-[#131926] text-white{% else %}text-slate-400 hover:bg-[#131926]/60 hover:text-white{% endif %}">
                    <span class="material-icons-outlined text-[19px]">menu_book</span>
                    <span>Buku</span>
                </a>

                <a href="{% url 'peminjaman_list' %}"
                    class="flex items-center gap-3 px-3.5 py-2.5 rounded-xl text-sm font-medium transition
                          {% if '/peminjaman/' in request.path %}bg-[#131926] text-white{% else %}text-slate-400 hover:bg-[#131926]/60 hover:text-white{% endif %}">
                    <span class="material-icons-outlined text-[19px]">assignment</span>
                    <span>Peminjaman</span>
                </a>

                <a href="{% url 'siswa_list' %}"
                    class="flex items-center gap-3 px-3.5 py-2.5 rounded-xl text-sm font-medium transition
                          {% if '/siswa/' in request.path %}bg-[#131926] text-white{% else %}text-slate-400 hover:bg-[#131926]/60 hover:text-white{% endif %}">
                    <span class="material-icons-outlined text-[19px]">people_alt</span>
                    <span>User</span>
                </a>

            </nav>

            <!-- Admin Info -->
            <div class="px-3.5 pb-5">
                <div class="rounded-2xl bg-[#131926] p-3 border border-slate-800">
                    <p class="text-[9px] font-bold text-slate-500 tracking-wider">ADMIN AKTIF</p>
                    <p class="text-sm font-semibold text-white mt-0.5">Budi Siregar</p>
                </div>
            </div>

        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-6 md:p-7">
            {% block content %}{% endblock %}
        </main>

    </div>

</body>

</html>
