<!doctype html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}SIPUSTAKA - Sistem Peminjaman Buku{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Icons+Outlined" rel="stylesheet" />

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: "#eff6ff",
                            100: "#dbeafe",
                            200: "#bfdbfe",
                            300: "#93c5fd",
                            400: "#60a5fa",
                            500: "#3b82f6",
                            600: "#2563eb",
                            700: "#1d4ed8",
                            800: "#1e40af",
                            900: "#1e3a8a",
                        },
                    },
                },
            },
        };
    </script>

    <style>
        body {
            font-family: Inter, sans-serif;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="bg-[#f8fafc] text-slate-900">

    <div class="min-h-screen flex flex-col md:flex-row">

        
        <aside class="w-full md:w-52 bg-[#090d16] text-slate-100 flex flex-col">

           
            <div>
                <div class="px-4 py-5 border-b border-slate-900">
                    <div class="flex items-center gap-2">
                        <div
                            class="w-8 h-8 rounded-xl bg-gradient-to-br from-brand-500 to-sky-400 flex items-center justify-center shadow-lg shadow-brand-500/20">
                            <span class="text-sm font-bold text-white">P</span>
                        </div>

                        <div>
                            <p class="text-[8px] font-bold text-slate-500 uppercase tracking-[0.1em] leading-none">
                                SIPUSTAKA
                            </p>

                            <h1 class="text-[11px] font-bold text-white mt-0.5 leading-tight">
                                Sistem Buku
                            </h1>
                        </div>
                    </div>
                </div>

                <nav class="px-2.5 py-5 space-y-1">

                    <a href="{% url 'index' %}"
                        class="w-full rounded-xl px-3.5 py-2.5 flex items-center gap-2.5 transition text-[12px] font-semibold {% if request.path == '/' %}text-white bg-[#131926]{% else %}text-slate-400 hover:text-white hover:bg-[#131926]/50{% endif %}">
                        <span class="material-icons-outlined text-base">grid_view</span>
                        Dashboard
                    </a>

                    <a href="{% url 'buku_list' %}"
                        class="w-full rounded-xl px-3.5 py-2.5 flex items-center gap-2.5 transition text-[12px] font-semibold {% if '/buku/' in request.path %}text-white bg-[#131926]{% else %}text-slate-400 hover:text-white hover:bg-[#131926]/50{% endif %}">
                        <span class="material-icons-outlined text-base">menu_book</span>
                        Buku
                    </a>

                    <a href="{% url 'peminjaman_list' %}"
                        class="w-full rounded-xl px-3.5 py-2.5 flex items-center gap-2.5 transition text-[12px] font-semibold {% if '/peminjaman/' in request.path %}text-white bg-[#131926]{% else %}text-slate-400 hover:text-white hover:bg-[#131926]/50{% endif %}">
                        <span class="material-icons-outlined text-base">assignment</span>
                        Peminjaman
                    </a>

                    <a href="{% url 'siswa_list' %}"
                        class="w-full rounded-xl px-3.5 py-2.5 flex items-center gap-2.5 transition text-[12px] font-semibold {% if '/siswa/' in request.path %}text-white bg-[#131926]{% else %}text-slate-400 hover:text-white hover:bg-[#131926]/50{% endif %}">
                        <span class="material-icons-outlined text-base">people_alt</span>
                        User
                    </a>

                </nav>
            </div>

          
            <div class="mt-auto px-3.5 pb-5">
                <div class="rounded-xl bg-[#131926] p-2.5 border border-slate-900">
                    <p class="text-[8px] font-bold text-slate-500 uppercase tracking-wider">
                        Admin Aktif
                    </p>

                    <p class="mt-0.5 text-[11px] font-bold text-white tracking-wide leading-tight">
                        Budi Siregar
                    </p>
                </div>
            </div>

        </aside>

       
        <main class="flex-1 p-7">
            {% block content %}
            {% endblock %}
        </main>

    </div>

</body>

</html>
