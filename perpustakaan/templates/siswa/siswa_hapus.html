{% extends 'base.html' %}

{% block title %}Hapus User - SIPUSTAKA{% endblock %}

{% block content %}
<div class="flex items-center gap-3 mb-6">
  <a href="{% url 'siswa_list' %}" class="w-8 h-8 bg-white rounded-full border border-slate-200 shadow-sm flex items-center justify-center text-slate-600 hover:bg-slate-50 transition">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
    </svg>
  </a>
  <div>
    <p class="text-[11px] text-slate-400 font-semibold tracking-wide">Kelola User</p>
    <h3 class="text-xl font-bold text-slate-800 leading-tight">Hapus User</h3>
  </div>
</div>

<div class="max-w-[540px] bg-white rounded-3xl p-6 shadow-[0_8px_30px_rgb(0,0,0,0.03)] border border-slate-100">
  <form method="POST" class="space-y-4">
    {% csrf_token %}

    <div class="space-y-1.5 pb-2">
      <p class="text-xs text-slate-500 font-medium">Anda akan menghapus:</p>
      <h4 class="text-sm font-bold text-slate-900">{{ siswa.nama }}</h4>
      <p class="text-[11px] text-slate-400 font-medium leading-relaxed">
        Data user akan dihapus dari daftar anggota perpustakaan secara permanen.
      </p>
    </div>

    <div class="pt-5 flex items-center justify-end gap-3 border-t border-slate-200 mt-2">
      <a href="{% url 'siswa_list' %}" class="rounded-xl bg-slate-50 border border-slate-200 text-slate-600 px-5 py-2 text-xs font-bold hover:bg-slate-100 transition text-center shadow-sm">
        Batal
      </a>
      <button type="submit" class="rounded-xl bg-[#e11d48] text-white px-5 py-2 text-xs font-bold hover:bg-rose-700 transition shadow-md shadow-rose-500/10">
        Hapus
      </button>
    </div>

  </form>
</div>
{% endblock %}
