{% extends 'base.html' %}

{% block title %}Edit User - SIPUSTAKA{% endblock %}

{% block content %}
<div class="flex items-center gap-3 mb-6">
  <a href="{% url 'siswa_list' %}"
    class="w-8 h-8 bg-white rounded-full border border-slate-200 shadow-sm flex items-center justify-center text-slate-600 hover:bg-slate-50 transition">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
    </svg>
  </a>
  <div>
    <p class="text-[11px] text-slate-400 font-semibold tracking-wide">Kelola User</p>
    <h3 class="text-xl font-bold text-slate-800 leading-tight">Edit User</h3>
  </div>
</div>

<div class="max-w-[760px] bg-white rounded-3xl p-6 shadow-[0_8px_30px_rgb(0,0,0,0.03)] border border-slate-100">
  <form method="POST" class="space-y-4">
    {% csrf_token %}

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <div class="space-y-1">
        <label for="nama" class="text-[11px] font-semibold text-slate-400">Nama</label>
        <input type="text" name="nama" id="nama" required value="{{ siswa.nama }}"
          class="w-full rounded-xl border border-slate-200 px-4 py-2.5 text-xs text-slate-700 font-medium bg-white focus:border-[#3b82f6] focus:ring-4 focus:ring-blue-50 transition outline-none">
      </div>
      <div class="space-y-1">
        <label for="kelas" class="text-[11px] font-semibold text-slate-400">Kelas</label>
        <input type="text" name="kelas" id="kelas" required value="{{ siswa.kelas }}"
          class="w-full rounded-xl border border-slate-200 px-4 py-2.5 text-xs text-slate-700 font-medium bg-white focus:border-[#3b82f6] focus:ring-4 focus:ring-blue-50 transition outline-none">
      </div>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 pb-2">
      <div class="space-y-1">
        <label for="nis" class="text-[11px] font-semibold text-slate-400">NIS</label>
        <input type="text" name="nis" id="nis" required value="{{ siswa.nis }}"
          class="w-full rounded-xl border border-slate-200 px-4 py-2.5 text-xs text-slate-700 font-mono bg-white focus:border-[#3b82f6] focus:ring-4 focus:ring-blue-50 transition outline-none">
      </div>
      <div class="space-y-1">
        <label for="status" class="text-[11px] font-semibold text-slate-400">Status</label>
        <div class="relative">
          <select name="is_active" id="is_active"
            class="w-full rounded-xl border border-slate-200 px-4 py-2.5 text-xs text-slate-700 font-medium bg-white appearance-none focus:border-[#3b82f6] focus:ring-4 focus:ring-blue-50 transition outline-none cursor-pointer">

            <option value="True" {% if siswa.is_active %}selected{% endif %}>Aktif</option>
            <option value="False" {% if not siswa.is_active %}selected{% endif %}>Tidak Aktif</option>

          </select>
          <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-400">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
            </svg>
          </div>
        </div>
      </div>
    </div>

    <div class="pt-5 flex items-center justify-end gap-3 border-t border-slate-200 mt-2">
      <a href="{% url 'siswa_list' %}"
        class="rounded-xl bg-slate-50 border border-slate-200 text-slate-600 px-5 py-2 text-xs font-bold hover:bg-slate-100 transition text-center shadow-sm">
        Batal
      </a>
      <button type="submit"
        class="rounded-xl bg-[#2563eb] text-white px-5 py-2 text-xs font-bold hover:bg-blue-700 transition shadow-md shadow-blue-500/10">
        Perbarui User
      </button>
    </div>

  </form>
</div>
{% endblock %}
