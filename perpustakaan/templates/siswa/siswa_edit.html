{% extends 'base.html' %}

{% block title %}Edit User - SIPUSTAKA{% endblock %}
{% block sidebar_title %}Sistem User{% endblock %}

{% block content %}

<div class="w-full max-w-[1000px] ml-1 md:ml-2">

    <!-- Header -->
    <div class="flex items-center gap-4 mb-6">
        <a href="{% url 'siswa_list' %}"
           class="flex h-9 w-9 items-center justify-center rounded-2xl border border-slate-200 bg-white text-slate-600 shadow-sm hover:bg-slate-50 transition">
            <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
            </svg>
        </a>
        <div>
            <p class="text-xs font-semibold tracking-wider text-slate-400">KELOLA USER</p>
            <h1 class="text-2xl font-bold text-slate-900">Edit User</h1>
        </div>
    </div>

    <!-- Form -->
    <div class="rounded-3xl border border-slate-100 bg-white p-8 shadow-sm">

        <form method="POST" class="space-y-6">
            {% csrf_token %}

            <div class="grid grid-cols-1 gap-5 md:grid-cols-2">

                <!-- Nama -->
                <div>
                    <label class="mb-1.5 block text-xs font-semibold text-slate-500">Nama Lengkap</label>
                    <input type="text" name="nama" value="{{ siswa.nama }}" required
                           class="w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm focus:border-blue-500 focus:ring-4 focus:ring-blue-50 transition outline-none">
                </div>

                <!-- Kelas -->
                <div>
                    <label class="mb-1.5 block text-xs font-semibold text-slate-500">Kelas</label>
                    <input type="text" name="kelas" value="{{ siswa.kelas }}" required
                           class="w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm focus:border-blue-500 focus:ring-4 focus:ring-blue-50 transition outline-none">
                </div>

                <!-- NIS -->
                <div>
                    <label class="mb-1.5 block text-xs font-semibold text-slate-500">NIS</label>
                    <input type="text" name="nis" value="{{ siswa.nis }}" required
                           class="w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm font-mono focus:border-blue-500 focus:ring-4 focus:ring-blue-50 transition outline-none">
                </div>

                <!-- Status -->
                <div>
                    <label class="mb-1.5 block text-xs font-semibold text-slate-500">Status</label>
                    <select name="is_active"
                            class="w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm focus:border-blue-500 focus:ring-4 focus:ring-blue-50 transition outline-none">
                        <option value="True" {% if siswa.is_active %}selected{% endif %}>Aktif</option>
                        <option value="False" {% if not siswa.is_active %}selected{% endif %}>Tidak Aktif</option>
                    </select>
                </div>

            </div>

            <!-- Action Buttons -->
            <div class="flex justify-end gap-3 border-t border-slate-100 pt-6">
                <a href="{% url 'siswa_list' %}"
                   class="rounded-2xl border border-slate-200 px-6 py-2.5 text-sm font-semibold text-slate-600 hover:bg-slate-50 transition">
                    Batal
                </a>
                <button type="submit"
                        class="rounded-2xl bg-blue-600 px-6 py-2.5 text-sm font-semibold text-white shadow-md shadow-blue-500/10 hover:bg-blue-700 transition">
                    Perbarui User
                </button>
            </div>

        </form>
    </div>

</div>

{% endblock %}
