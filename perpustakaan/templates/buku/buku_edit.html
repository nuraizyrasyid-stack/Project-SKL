{% extends 'base.html' %}

{% block title %}Edit Buku - SIPUSTAKA{% endblock %}

{% block content %}

<div class="w-full max-w-3xl flex items-center gap-3 mb-4 ml-4 md:ml-6">
    <a href="{% url 'buku_list' %}" class="text-slate-500 hover:text-slate-700 transition">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
        </svg>
    </a>
    <div>
        <p class="text-[10px] text-slate-400 font-bold tracking-wider">Kelola Buku</p>
        <h1 class="text-xl font-bold text-slate-900 leading-tight">Edit Buku</h1>
    </div>
</div>

<div
    class="w-full max-w-3xl bg-white rounded-2xl border border-slate-100 shadow-[0_4px_25px_rgb(0,0,0,0.01)] p-6 ml-4 md:ml-6">
    <form method="POST" action="{% url 'buku_edit' buku.id %}" class="space-y-4">
        {% csrf_token %}

        <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-3">
            <div>
                <label class="block text-[9px] font-extrabold text-slate-400 uppercase tracking-wider mb-1">Judul
                    Buku</label>
                <input type="text" name="judul" value="{{ buku.judul }}" required
                    class="w-full px-3 py-2 rounded-xl border border-slate-200 text-xs text-slate-800 font-medium bg-slate-50/50 focus:outline-none focus:border-blue-500 focus:bg-white transition">
            </div>

            <div>
                <label
                    class="block text-[9px] font-extrabold text-slate-400 uppercase tracking-wider mb-1">Pengarang</label>
                <input type="text" name="pengarang" value="{{ buku.pengarang }}" required
                    class="w-full px-3 py-2 rounded-xl border border-slate-200 text-xs text-slate-800 font-medium bg-slate-50/50 focus:outline-none focus:border-blue-500 focus:bg-white transition">
            </div>

            <div>
                <label
                    class="block text-[9px] font-extrabold text-slate-400 uppercase tracking-wider mb-1">Kategori</label>
                <select name="kategori" required
                    class="w-full px-3 py-2 rounded-xl border border-slate-200 text-xs text-slate-800 font-medium bg-slate-50/50 focus:outline-none focus:border-blue-500 focus:bg-white transition">
                    <option value="">Pilih Kategori</option>
                    {% for kategori in pilihan_kategori %}
                   <option value="{{ kategori }}" {% if kategori == buku.kategori %}selected{% endif %}>{{ kategori }}</option>
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label
                    class="block text-[9px] font-extrabold text-slate-400 uppercase tracking-wider mb-1">Penerbit</label>
                <input type="text" name="penerbit" value="{{ buku.penerbit }}" required
                    class="w-full px-3 py-2 rounded-xl border border-slate-200 text-xs text-slate-800 font-medium bg-slate-50/50 focus:outline-none focus:border-blue-500 focus:bg-white transition">
            </div>

            <div>
                <label class="block text-[9px] font-extrabold text-slate-400 uppercase tracking-wider mb-1">Tahun
                    Terbit</label>
                <input type="number" name="tahun_terbit" value="{{ buku.tahun_terbit }}" required
                    class="w-full px-3 py-2 rounded-xl border border-slate-200 text-xs text-slate-800 font-medium bg-slate-50/50 focus:outline-none focus:border-blue-500 focus:bg-white transition">
            </div>

            <div>
                <label class="block text-[9px] font-extrabold text-slate-400 uppercase tracking-wider mb-1">Stok</label>
                <input type="number" name="stok" value="{{ buku.stok }}" required
                    class="w-full px-3 py-2 rounded-xl border border-slate-200 text-xs text-slate-800 font-medium bg-slate-50/50 focus:outline-none focus:border-blue-500 focus:bg-white transition">
            </div>

            <div>
                <label class="block text-[9px] font-extrabold text-slate-400 uppercase tracking-wider mb-1">ISBN</label>
                <input type="text" name="isbn" value="{{ buku.isbn }}" required
                    class="w-full px-3 py-2 rounded-xl border border-slate-200 text-xs text-slate-800 font-medium bg-slate-50/50 focus:outline-none focus:border-blue-500 focus:bg-white transition">
            </div>

            <div>
                <label class="block text-[9px] font-extrabold text-slate-400 uppercase tracking-wider mb-1">Rak /
                    Lokasi</label>
                <input type="text" name="rak" value="{{ buku.rak }}" required
                    class="w-full px-3 py-2 rounded-xl border border-slate-200 text-xs text-slate-800 font-medium bg-slate-50/50 focus:outline-none focus:border-blue-500 focus:bg-white transition">
            </div>
        </div>

        <div>
            <label
                class="block text-[9px] font-extrabold text-slate-400 uppercase tracking-wider mb-1">Deskripsi</label>
            <textarea name="deskripsi" rows="3"
                class="w-full px-3 py-2 rounded-xl border border-slate-200 text-xs text-slate-800 font-medium bg-slate-50/50 focus:outline-none focus:border-blue-500 focus:bg-white transition resize-none">{{ buku.deskripsi }}</textarea>
        </div>

        <div class="flex justify-end gap-3 pt-2 border-t border-slate-50">
            <a href="{% url 'buku_list' %}"
                class="px-5 py-2 bg-white border border-slate-200 rounded-xl text-xs font-bold text-slate-600 hover:bg-slate-50 transition shadow-sm flex items-center">
                Batal
            </a>
            <button type="submit"
                class="px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-xl text-xs font-bold transition shadow-sm flex items-center">
                Perbarui Buku
            </button>
        </div>
    </form>
</div>

{% endblock %}
