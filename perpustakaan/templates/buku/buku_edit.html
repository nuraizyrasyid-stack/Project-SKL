{% extends 'base.html' %}

{% block title %}Edit Buku - SIPUSTAKA{% endblock %}
{% block sidebar_title %}Sistem Buku{% endblock %}

{% block content %}

<div class="w-full max-w-[1000px] ml-1 md:ml-2">

    <!-- Header -->
    <div class="flex items-center gap-4 mb-6">
        <a href="{% url 'buku_list' %}"
            class="flex h-9 w-9 items-center justify-center rounded-2xl border border-slate-200 bg-white text-slate-600 shadow-sm hover:bg-slate-50 transition">
            <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
            </svg>
        </a>
        <div>
            <p class="text-xs font-semibold tracking-wider text-slate-400">KELOLA BUKU</p>
            <h1 class="text-2xl font-bold text-slate-900">Edit Buku</h1>
        </div>
    </div>

    <!-- Form Card -->
    <div class="rounded-3xl border border-slate-100 bg-white p-8 shadow-sm">

        <form method="POST" action="{% url 'buku_edit' buku.id %}" class="space-y-6">
            {% csrf_token %}

            <div class="grid grid-cols-1 gap-5 md:grid-cols-2">

                <!-- Judul -->
                <div>
                    <label class="mb-1.5 block text-xs font-semibold text-slate-500">Judul Buku</label>
                    <input type="text" name="judul" value="{{ buku.judul }}" required
                        class="w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm focus:border-blue-500 focus:ring-4 focus:ring-blue-50 transition outline-none">
                </div>

                <!-- Pengarang -->
                <div>
                    <label class="mb-1.5 block text-xs font-semibold text-slate-500">Pengarang</label>
                    <input type="text" name="pengarang" value="{{ buku.pengarang }}" required
                        class="w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm focus:border-blue-500 focus:ring-4 focus:ring-blue-50 transition outline-none">
                </div>

                <!-- Kategori -->
                <div>
                    <label class="mb-1.5 block text-xs font-semibold text-slate-500">Kategori</label>
                    <select name="kategori" required
                        class="w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm focus:border-blue-500 focus:ring-4 focus:ring-blue-50 transition outline-none">
                        <option value="">Pilih Kategori</option>
                        {% for kategori in pilihan_kategori %}
                        <option value="{{ kategori }}" {% if kategori|stringformat:"s" == buku.kategori|stringformat:"s" %}selected{% endif %}>{{ kategori }}</option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Penerbit -->
                <div>
                    <label class="mb-1.5 block text-xs font-semibold text-slate-500">Penerbit</label>
                    <input type="text" name="penerbit" value="{{ buku.penerbit }}" required
                        class="w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm focus:border-blue-500 focus:ring-4 focus:ring-blue-50 transition outline-none">
                </div>

                <!-- Tahun Terbit -->
                <div>
                    <label class="mb-1.5 block text-xs font-semibold text-slate-500">Tahun Terbit</label>
                    <input type="number" name="tahun_terbit" value="{{ buku.tahun_terbit }}" required
                        class="w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm focus:border-blue-500 focus:ring-4 focus:ring-blue-50 transition outline-none">
                </div>

                <!-- Stok -->
                <div>
                    <label class="mb-1.5 block text-xs font-semibold text-slate-500">Stok Buku</label>
                    <input type="number" name="stok" value="{{ buku.stok }}" required
                        class="w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm focus:border-blue-500 focus:ring-4 focus:ring-blue-50 transition outline-none">
                </div>

                <!-- ISBN -->
                <div>
                    <label class="mb-1.5 block text-xs font-semibold text-slate-500">ISBN</label>
                    <input type="text" name="isbn" value="{{ buku.isbn }}" required
                        class="w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm font-mono focus:border-blue-500 focus:ring-4 focus:ring-blue-50 transition outline-none">
                </div>

                <!-- Rak -->
                <div>
                    <label class="mb-1.5 block text-xs font-semibold text-slate-500">Rak / Lokasi</label>
                    <input type="text" name="rak" value="{{ buku.rak }}" required
                        class="w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm focus:border-blue-500 focus:ring-4 focus:ring-blue-50 transition outline-none">
                </div>

            </div>

            <!-- Deskripsi -->
            <div>
                <label class="mb-1.5 block text-xs font-semibold text-slate-500">Deskripsi Buku</label>
                <textarea name="deskripsi" rows="4"
                    class="w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm focus:border-blue-500 focus:ring-4 focus:ring-blue-50 transition outline-none resize-none">{{ buku.deskripsi }}</textarea>
            </div>

            <!-- Buttons -->
            <div class="flex justify-end gap-3 border-t border-slate-100 pt-6">
                <a href="{% url 'buku_list' %}"
                    class="rounded-2xl border border-slate-200 px-6 py-2.5 text-sm font-semibold text-slate-600 hover:bg-slate-50 transition">
                    Batal
                </a>
                <button type="submit"
                    class="rounded-2xl bg-blue-600 px-6 py-2.5 text-sm font-semibold text-white shadow-md shadow-blue-500/10 hover:bg-blue-700 transition">
                    Perbarui Data
                </button>
            </div>

        </form>
    </div>

</div>

{% endblock %}
