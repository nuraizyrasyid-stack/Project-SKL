{% extends 'base.html' %}

{% block title %}Edit Buku - SIPUSTAKA{% endblock %}

{% block content %}

<div class="w-full max-w-3xl flex items-center gap-3 mb-5 mx-auto">
    <a href="{% url 'buku_list' %}" class="flex items-center justify-center w-8 h-8 rounded-xl bg-white border border-slate-200 text-slate-500 hover:text-slate-800 hover:border-slate-300 shadow-sm transition">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
        </svg>
    </a>
    <div>
        <p class="text-[10px] text-slate-400 font-bold tracking-wider uppercase">Kelola Buku</p>
        <h1 class="text-xl font-bold text-slate-900 leading-tight">Edit Buku</h1>
    </div>
</div>

<div class="w-full max-w-3xl bg-white rounded-2xl border border-slate-100 shadow-[0_8px_30px_rgb(0,0,0,0.02)] p-6 md:p-8 mx-auto">
    <form method="POST" action="{% url 'buku_edit' buku.id %}" class="space-y-5">
        {% csrf_token %}

        <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-4">
            <div>
                <label class="block text-[11px] font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Judul Buku</label>
                <input type="text" name="judul" value="{{ buku.judul }}" required
                    class="w-full px-3.5 py-2.5 rounded-xl border border-slate-200 text-xs text-slate-800 font-medium bg-slate-50/60 focus:outline-none focus:border-blue-500 focus:bg-white focus:ring-4 focus:ring-blue-50 transition duration-200">
            </div>

            <div>
                <label class="block text-[11px] font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Pengarang</label>
                <input type="text" name="pengarang" value="{{ buku.pengarang }}" required
                    class="w-full px-3.5 py-2.5 rounded-xl border border-slate-200 text-xs text-slate-800 font-medium bg-slate-50/60 focus:outline-none focus:border-blue-500 focus:bg-white focus:ring-4 focus:ring-blue-50 transition duration-200">
            </div>

            <div>
                <label class="block text-[11px] font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Kategori</label>
                <select name="kategori" required
                    class="w-full px-3.5 py-2.5 rounded-xl border border-slate-200 text-xs text-slate-800 font-medium bg-slate-50/60 focus:outline-none focus:border-blue-500 focus:bg-white focus:ring-4 focus:ring-blue-50 transition duration-200">
                    <option value="">Pilih Kategori</option>
                    {% for kategori in pilihan_kategori %}
                    <option value="{{ kategori }}" {% if kategori == buku.kategori %}selected{% endif %}>{{ kategori }}</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label class="block text-[11px] font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Penerbit</label>
                <input type="text" name="penerbit" value="{{ buku.penerbit }}" required
                    class="w-full px-3.5 py-2.5 rounded-xl border border-slate-200 text-xs text-slate-800 font-medium bg-slate-50/60 focus:outline-none focus:border-blue-500 focus:bg-white focus:ring-4 focus:ring-blue-50 transition duration-200">
            </div>

            <div>
                <label class="block text-[11px] font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Tahun Terbit</label>
                <input type="number" name="tahun_terbit" value="{{ buku.tahun_terbit }}" required
                    class="w-full px-3.5 py-2.5 rounded-xl border border-slate-200 text-xs text-slate-800 font-medium bg-slate-50/60 focus:outline-none focus:border-blue-500 focus:bg-white focus:ring-4 focus:ring-blue-50 transition duration-200">
            </div>

            <div>
                <label class="block text-[11px] font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Stok Buku</label>
                <input type="number" name="stok" value="{{ buku.stok }}" required
                    class="w-full px-3.5 py-2.5 rounded-xl border border-slate-200 text-xs text-slate-800 font-medium bg-slate-50/60 focus:outline-none focus:border-blue-500 focus:bg-white focus:ring-4 focus:ring-blue-50 transition duration-200">
            </div>

            <div>
                <label class="block text-[11px] font-semibold text-slate-500 uppercase tracking-wider mb-1.5">ISBN</label>
                <input type="text" name="isbn" value="{{ buku.isbn }}" required
                    class="w-full px-3.5 py-2.5 rounded-xl border border-slate-200 text-xs text-slate-800 font-medium bg-slate-50/60 focus:outline-none focus:border-blue-500 focus:bg-white focus:ring-4 focus:ring-blue-50 transition duration-200">
            </div>

            <div>
                <label class="block text-[11px] font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Rak / Lokasi</label>
                <input type="text" name="rak" value="{{ buku.rak }}" required
                    class="w-full px-3.5 py-2.5 rounded-xl border border-slate-200 text-xs text-slate-800 font-medium bg-slate-50/60 focus:outline-none focus:border-blue-500 focus:bg-white focus:ring-4 focus:ring-blue-50 transition duration-200">
            </div>
        </div>

        <div>
            <label class="block text-[11px] font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Deskripsi Buku</label>
            <textarea name="deskripsi" rows="4"
                class="w-full px-3.5 py-2.5 rounded-xl border border-slate-200 text-xs text-slate-800 font-medium bg-slate-50/60 focus:outline-none focus:border-blue-500 focus:bg-white focus:ring-4 focus:ring-blue-50 transition duration-200 resize-none">{{ buku.deskripsi }}</textarea>
        </div>

        <div class="flex justify-end gap-3 pt-4 border-t border-slate-100">
            <a href="{% url 'buku_list' %}"
                class="px-5 py-2.5 bg-white border border-slate-200 rounded-xl text-xs font-bold text-slate-600 hover:bg-slate-50 hover:text-slate-800 shadow-sm transition flex items-center">
                Batal
            </a>
            <button type="submit"
                class="px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-xl text-xs font-bold shadow-md shadow-blue-500/10 hover:shadow-blue-500/20 transition flex items-center">
                Perbarui Data
            </button>
        </div>
    </form>
</div>

{% endblock %}
